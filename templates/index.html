<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Visual Scrambler</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 600px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        h2 { color: #007bff; text-align: center; margin-bottom: 25px; }
        .section { background: #252525; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px 0; }
        label { font-size: 0.9em; color: #aaa; }
        input { background: #333; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }
        .btn:hover { background: #0056b3; }
        .btn-un { background: #28a745; }
        .btn-un:hover { background: #218838; }
        .btn-reset { background: #555; margin-top: 15px; }
        .btn-reset:hover { background: #444; }
        .result-box { background: #000; padding: 15px; margin-top: 15px; border-radius: 5px; border: 1px dashed #007bff; }
        code { word-break: break-all; font-family: monospace; font-size: 13px; color: #00ff41; }
        .error-box { background: #dc3545; color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; }
        .flex-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        input[type="checkbox"] { width: auto; transform: scale(1.2); cursor: pointer; }
        .warning-text { font-size: 11px; color: #ffeb3b; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎞️ Universal Scrambler</h2>
        
        {% if error %} <div class="error-box">{{ error }}</div> {% endif %}
        
        <form method="post" enctype="multipart/form-data">
            <div class="section">
                <strong>1. Upload File (Video or Image)</strong>
                <input type="file" id="mediaUpload" name="file" style="margin-top:10px;" required>
                <div class="warning-text">* Browsers require you to re-select the file on every process.</div>
                
                <div class="grid">
                    <div><label>Columns:</label><input type="number" name="cols" value="{{ cols }}" min="2"></div>
                    <div><label>Rows:</label><input type="number" name="rows" value="{{ rows }}" min="2"></div>
                </div>

                <div style="margin-top: 15px;">
                    <label>SID Seed (Identical keys for same SID):</label>
                    <input type="text" name="sid" value="{{ sid }}" placeholder="Leave empty for random generation">
                </div>

                <div class="grid" style="margin-top:15px; padding-top:15px; border-top: 1px solid #444;">
                    <div>
                        <div class="flex-row">
                            <label>Width (px):</label>
                            <label><input type="checkbox" id="aspectLock" checked> Lock Ratio</label>
                        </div>
                        <input type="number" id="resW" name="resize_w" value="{{ resize_w }}" placeholder="Orig Width">
                    </div>
                    <div>
                        <label>Height (px):</label>
                        <input type="number" id="resH" name="resize_h" value="{{ resize_h }}" placeholder="Orig Height">
                    </div>
                </div>

                <button type="submit" name="action" value="scramble" class="btn">SCRAMBLE & GENERATE KEY</button>
            </div>

            <div class="section">
                <strong>2. Restore File</strong>
                <input type="text" name="key" placeholder="Paste key here: 10x10|abc..." style="margin: 10px 0;">
                <button type="submit" name="action" value="unscramble" class="btn btn-un">UNSCRAMBLE</button>
            </div>
            
            
            <a href="/" class="btn btn-reset">↺ RESET ALL SETTINGS TO DEFAULTS</a>
        </form>

        {% if key %}
        <div class="result-box">
            <strong>YOUR KEY:</strong><br>
            <code id="keyText">{{ key }}</code>
            <button onclick="navigator.clipboard.writeText(document.getElementById('keyText').innerText); alert('Copied!');" style="margin-top:10px; padding:5px; cursor:pointer;">Copy Key</button>
        </div>
        {% endif %}
    </div>

    <script>
        let origRatio = 1;

        document.getElementById('mediaUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            
            if (file.type.startsWith('image/')) {
                const img = new Image();
                img.onload = () => { setRatio(img.width, img.height); };
                img.src = url;
            } else if (file.type.startsWith('video/')) {
                const vid = document.createElement('video');
                vid.onloadedmetadata = () => { setRatio(vid.videoWidth, vid.videoHeight); };
                vid.src = url;
            }
        });

        function setRatio(w, h) {
            origRatio = w / h;
            document.getElementById('resW').placeholder = w + " (Orig)";
            document.getElementById('resH').placeholder = h + " (Orig)";
        }

        document.getElementById('resW').addEventListener('input', function() {
            if (document.getElementById('aspectLock').checked && this.value) {
                document.getElementById('resH').value = Math.round(this.value / origRatio);
            }
        });

        document.getElementById('resH').addEventListener('input', function() {
            if (document.getElementById('aspectLock').checked && this.value) {
                document.getElementById('resW').value = Math.round(this.value * origRatio);
            }
        });
    </script>
</body>
</html>
