<div class="section" id="exportSettings">
    <strong>Export Settings</strong>
    <div class="grid-3" id="vidSettings">
        <div><label>Format</label><select id="v_fmt"><option value=".mp4">.mp4</option><option value=".mkv">.mkv</option><option value=".avi">.avi</option></select></div>
        <div><label>Codec</label><select id="v_codec"><option value="libx264">H.264</option><option value="libx265">H.265 (HEVC)</option></select></div>
        <div><label>Bitrate</label><select id="v_bit"><option value="1000k">1000k (Low)</option><option value="3000k" selected>3000k (Med)</option><option value="8000k">8000k (High)</option></select></div>
    </div>
    <div class="grid-3" id="audSettings">
        <div><label>Audio Hz</label><select id="a_sr"><option value="44100">44100 Hz</option><option value="48000" selected>48000 Hz</option></select></div>
        <div><label>Audio Codec</label><select id="a_codec"><option value="aac">AAC</option><option value="libmp3lame">MP3</option></select></div>
        <div><label>Audio Bitrate</label><select id="a_bit"><option value="128k">128k</option><option value="192k" selected>192k</option><option value="320k">320k</option></select></div>
    </div>
</div>

<div class="section" id="encryptionParams">
    <strong>Video Matrix Parameters</strong>
    <div class="grid">
        <div><label>Columns:</label><input type="number" id="cols" value="10" min="2"></div>
        <div><label>Rows:</label><input type="number" id="rows" value="10" min="2"></div>
    </div>
    <div style="margin-top:10px;"><label>SID Seed (Blank = Random):</label><input type="text" id="sid"></div>
    
    
    <div class="grid" style="margin-top:15px; padding-top:15px; border-top: 1px solid #444;">
        <div>
            <div class="flex-row">
                <label>Target Width (px):</label>
                <label style="color:#00d2ff;"><input type="checkbox" id="aspectLock" checked> Lock Ratio</label>
            </div>
            <input type="number" id="resW" placeholder="Orig Width">
        </div>
        <div>
            <label>Target Height (px):</label>
            <input type="number" id="resH" placeholder="Orig Height">
        </div>
    </div>
</div>
