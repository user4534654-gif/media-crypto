name: Build Nuitka EXE

on:
  workflow_dispatch:
    inputs:
      build_now:
        description: 'Build'
        required: true
        type: boolean
        default: true
  push:
    branches: [ "main" ]

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build]') }}
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: |
        python -m pip install --upgrade pip
        # Added 'imageio' here so Nuitka can convert icon.png to an icon file!
        pip install Flask opencv-python numpy imageio imageio-ffmpeg "Nuitka[onefile]" zstandard

    - run: |
        python -m nuitka --assume-yes-for-downloads --standalone --onefile --windows-icon-from-ico=icon.png --windows-company-name="Universal Scrambler OS" --windows-product-name="Video Scrambler Utility" --windows-file-description="Media Encryption and Decryption Tool" --windows-file-version="2.0.0.0" --windows-product-version="2.0.0.0" --include-data-dir=templates=templates main.py
        
    - uses: actions/upload-artifact@v4
      with:
        name: VideoScrambler-Windows-EXE
        path: main.exe
